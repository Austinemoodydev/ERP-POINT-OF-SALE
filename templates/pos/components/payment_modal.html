<div id="paymentModal" class="modal-overlay hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4">
        <div class="flex justify-between items-center px-6 py-4 border-b">
            <h3 class="text-lg font-bold">Payment</h3>
            <button onclick="closeModal('paymentModal')" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6">
            <div class="text-center mb-4">
                <p class="text-gray-500 text-sm">Amount Due</p>
                <p id="payDue" class="text-4xl font-bold text-blue-700">KES 0.00</p>
            </div>
            <!-- Payment Methods -->
            <div class="grid grid-cols-4 gap-2 mb-4">
                <button onclick="setPayMethod('cash')" id="btnCash"
                    class="pay-method-btn bg-green-600 text-white py-3 rounded-lg text-sm font-medium">
                    &#128180; Cash
                </button>
                <button onclick="setPayMethod('mpesa')" id="btnMpesa"
                    class="pay-method-btn bg-gray-100 text-gray-700 py-3 rounded-lg text-sm font-medium hover:bg-green-50">
                    &#128247; M-Pesa
                </button>
                <button onclick="setPayMethod('card')" id="btnCard"
                    class="pay-method-btn bg-gray-100 text-gray-700 py-3 rounded-lg text-sm font-medium hover:bg-blue-50">
                    &#128179; Card
                </button>
                <button onclick="setPayMethod('split')" id="btnSplit"
                    class="pay-method-btn bg-gray-100 text-gray-700 py-3 rounded-lg text-sm font-medium hover:bg-purple-50">
                    &#9874; Split
                </button>
            </div>
            <!-- Cash Section -->
            <div id="cashSection">
                <label class="text-sm text-gray-600 font-medium">Amount Tendered (KES)</label>
                <input id="cashTendered" type="number" placeholder="0.00"
                    class="w-full border rounded-lg px-4 py-3 text-xl mt-1 focus:outline-none focus:ring-2 focus:ring-green-500"
                    onkeyup="calcChange()">
                <div class="flex justify-between mt-3 bg-green-50 rounded p-3">
                    <span class="font-medium">Change</span>
                    <span id="changeAmount" class="font-bold text-green-700 text-lg">KES 0.00</span>
                </div>
            </div>
            <!-- M-Pesa Section -->
            <div id="mpesaSection" class="hidden">
                <label class="text-sm text-gray-600 font-medium">M-Pesa Transaction Code</label>
                <input id="mpesaCode" type="text" placeholder="e.g. QGH7TY123X"
                    class="w-full border rounded-lg px-4 py-3 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-green-500 uppercase">
                <p class="text-xs text-gray-400 mt-1">Enter the M-Pesa confirmation code</p>
            </div>
            <!-- Card Section -->
            <div id="cardSection" class="hidden">
                <label class="text-sm text-gray-600 font-medium">Card Reference / Approval Code</label>
                <input id="cardRef" type="text" placeholder="Approval code"
                    class="w-full border rounded-lg px-4 py-3 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
        <div class="px-6 pb-6 flex gap-3">
            <button onclick="closeModal('paymentModal')" class="flex-1 border py-3 rounded-lg text-gray-600 hover:bg-gray-50">Cancel</button>
            <button onclick="completeSale()" class="flex-1 bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800">
                &#10003; Complete Sale
            </button>
        </div>
    </div>
</div>
